<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Producer | Rei do Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; }
        .gold-gradient { background: linear-gradient(90deg, #b8860b 0%, #ffdf00 50%, #b8860b 100%); }
        .gold-text { background: linear-gradient(90deg, #d4af37, #fcf6ba, #d4af37); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-playing { border-color: #fbbf24 !important; background: rgba(251, 191, 36, 0.1) !important; }
        #admin-screen { display: none; }
        #admin-screen.active { display: block; }
        .glass { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="pb-32">

    <div id="login-screen" class="fixed inset-0 z-[200] bg-black flex items-center justify-center p-6">
        <div class="max-w-sm w-full text-center">
            <img src="logo.jpg" class="w-24 h-24 mx-auto mb-6 rounded-full border-2 border-yellow-600">
            <h2 class="text-2xl font-black gold-text uppercase mb-6">Acesso Restrito</h2>
            <input type="password" id="pass-input" placeholder="Senha do Produtor" class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-xl mb-4 text-center outline-none focus:border-yellow-600 transition">
            <button onclick="checkPass()" class="w-full gold-gradient text-black font-black py-4 rounded-xl hover:scale-105 transition">Entrar no Estúdio</button>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <nav class="p-4 flex justify-between items-center border-b border-zinc-800 sticky top-0 bg-black/95 z-50">
            <div class="flex items-center gap-3">
                <img src="logo.jpg" class="w-8 h-8 rounded-full">
                <span class="font-black gold-text uppercase">Rei do Home</span>
            </div>
            <button onclick="showAdmin()" class="text-[10px] font-bold bg-yellow-600/10 text-yellow-500 border border-yellow-600/20 px-4 py-2 rounded-full hover:bg-yellow-600 hover:text-black transition">PAINEL DE CONTROLE</button>
        </nav>

        <div id="admin-screen" class="fixed inset-0 z-[150] glass overflow-y-auto">
            <div class="max-w-2xl mx-auto my-10 p-6 bg-zinc-900 rounded-3xl border border-zinc-800 shadow-2xl">
                <div class="flex justify-between items-center mb-10">
                    <h2 class="text-3xl font-black gold-text">GERENCIAR CATÁLOGO</h2>
                    <button onclick="showAdmin()" class="bg-zinc-800 w-10 h-10 rounded-full flex items-center justify-center text-zinc-400">✕</button>
                </div>

                <div class="grid md:grid-cols-2 gap-6 mb-10">
                    <div class="space-y-4">
                        <input type="text" id="new-titulo" placeholder="Nome da Track" class="w-full bg-black border border-zinc-800 p-3 rounded-lg outline-none focus:border-yellow-600">
                        <input type="text" id="new-artista" placeholder="Nome do Artista" class="w-full bg-black border border-zinc-800 p-3 rounded-lg outline-none focus:border-yellow-600">
                        <input type="text" id="new-capa" placeholder="URL da Capa (Opcional)" class="w-full bg-black border border-zinc-800 p-3 rounded-lg outline-none focus:border-yellow-600">
                    </div>
                    <div class="border-2 border-dashed border-zinc-800 rounded-2xl flex flex-col items-center justify-center p-6 hover:border-yellow-600 transition cursor-pointer relative">
                        <input type="file" id="file-upload" class="absolute inset-0 opacity-0 cursor-pointer" accept="audio/*">
                        <span class="text-yellow-600 mb-2">📁</span>
                        <span class="text-xs font-bold text-zinc-500 uppercase text-center" id="file-name">Upload do Beat (.mp3)</span>
                    </div>
                </div>
                <button onclick="uploadAndSave()" id="btn-save" class="w-full gold-gradient text-black font-black py-5 rounded-2xl uppercase tracking-widest shadow-lg shadow-yellow-600/20">Publicar Novo Hit</button>

                <div class="mt-12 border-t border-zinc-800 pt-8">
                    <h3 class="text-sm font-bold text-zinc-500 mb-4 uppercase">Músicas Atuais</h3>
                    <div id="admin-list" class="space-y-2"></div>
                </div>
            </div>
        </div>

        <main class="max-w-4xl mx-auto px-6 py-12">
            <div id="lista-musicas" class="grid gap-3"></div>
        </main>
    </div>

    <div id="player-bar" class="fixed bottom-0 left-0 right-0 bg-black/90 border-t border-zinc-800 p-4 z-[60] backdrop-blur-xl hidden">
        <div class="max-w-4xl mx-auto">
            <div id="progress-container" class="w-full bg-zinc-800 h-1 mb-4 rounded-full overflow-hidden cursor-pointer">
                <div id="progress" class="gold-gradient h-full w-0 transition-all"></div>
            </div>
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4 w-1/3 truncate">
                    <img id="player-img" src="logo.jpg" class="w-12 h-12 rounded-lg object-cover">
                    <div class="truncate">
                        <p id="player-title" class="text-sm font-black gold-text truncate">...</p>
                        <p id="player-artist" class="text-[10px] text-zinc-500 font-bold uppercase truncate">...</p>
                    </div>
                </div>
                <button id="play-btn" class="w-14 h-14 gold-gradient rounded-full flex items-center justify-center text-black">
                    <svg id="play-icon" class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.841z"></path></svg>
                </button>
                <div class="w-1/3 flex justify-end">
                    <input type="range" id="vol" min="0" max="1" step="0.1" value="1" class="w-16">
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://lctmbrajjjjdscsghagx.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_mlPssSVkGCWWzzPj8Jz6Wg_ycQh_cw3';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const audio = new Audio();
        
        // LOGIN
        function checkPass() {
            const pass = document.getElementById('pass-input').value;
            if(pass === '20262025') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('player-bar').classList.remove('hidden');
                fetchData();
            } else {
                alert("Senha incorreta, mestre!");
            }
        }

        function showAdmin() {
            document.getElementById('admin-screen').classList.toggle('active');
        }

        // MOSTRAR NOME DO ARQUIVO NO UPLOAD
        document.getElementById('file-upload').onchange = (e) => {
            document.getElementById('file-name').innerText = e.target.files[0].name;
        };

        // UPLOAD E SALVAMENTO AUTOMÁTICO
        async function uploadAndSave() {
            const file = document.getElementById('file-upload').files[0];
            const titulo = document.getElementById('new-titulo').value;
            const artista = document.getElementById('new-artista').value;
            const capa = document.getElementById('new-capa').value;

            if(!file || !titulo) return alert("Mínimo necessário: Arquivo e Título!");

            const btn = document.getElementById('btn-save');
            btn.innerText = "UPANDO BEAT... AGUARDE";
            btn.disabled = true;

            // 1. Enviar para o Storage
            const fileName = `${Date.now()}_${file.name}`;
            const { data: uploadData, error: uploadError } = await _supabase.storage
                .from('musicas') // Certifique-se que o bucket se chama 'musicas'
                .upload(fileName, file);

            if(uploadError) return alert("Erro no upload: " + uploadError.message);

            // 2. Pegar a URL pública
            const { data: urlData } = _supabase.storage.from('musicas').getPublicUrl(fileName);

            // 3. Salvar no Banco
            await _supabase.from('musicas').insert([{
                titulo, artista, audio_url: urlData.publicUrl, capa_url: capa
            }]);

            location.reload();
        }

        async function fetchData() {
            const { data } = await _supabase.from('musicas').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('lista-musicas');
            const adminList = document.getElementById('admin-list');
            list.innerHTML = '';
            adminList.innerHTML = '';

            data.forEach(m => {
                // Lista Cliente
                const card = document.createElement('div');
                card.className = "song-card flex items-center justify-between p-4 bg-zinc-900/40 border border-zinc-800 rounded-2xl hover:bg-zinc-800/60 cursor-pointer";
                card.onclick = () => playSong(m.audio_url, m.titulo, m.artista, m.capa_url);
                card.innerHTML = `<div class="flex items-center gap-4"><img src="${m.capa_url || 'logo.jpg'}" class="w-12 h-12 rounded-lg object-cover"><div><h4 class="font-bold">${m.titulo}</h4><p class="text-[10px] text-zinc-500 uppercase font-bold">${m.artista}</p></div></div>`;
                list.appendChild(card);

                // Lista Admin (com botão excluir)
                const aCard = document.createElement('div');
                aCard.className = "flex justify-between items-center bg-black p-3 rounded-lg border border-zinc-800";
                aCard.innerHTML = `<span class="text-xs font-bold">${m.titulo}</span><button onclick="deleteSong(${m.id})" class="text-red-500 text-xs">EXCLUIR</button>`;
                adminList.appendChild(aCard);
            });
        }

        async function deleteSong(id) {
            if(confirm("Deseja apagar essa track do catálogo?")) {
                await _supabase.from('musicas').delete().eq('id', id);
                location.reload();
            }
        }

        function playSong(url, t, a, c) {
            audio.src = url;
            document.getElementById('player-title').innerText = t;
            document.getElementById('player-artist').innerText = a;
            document.getElementById('player-img').src = c || 'logo.jpg';
            audio.play();
        }

        // PROGRESSO E CONTROLES
        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progress').style.width = pct + '%';
        }
        document.getElementById('progress-container').onclick = (e) => {
            audio.currentTime = (e.offsetX / e.target.clientWidth) * audio.duration;
        }
        document.getElementById('vol').oninput = (e) => audio.volume = e.target.value;
        document.getElementById('play-btn').onclick = () => audio.paused ? audio.play() : audio.pause();
    </script>
</body>
</html>
