<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtora Rei do Home | Plataforma Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; }
        .gold-gradient { background: linear-gradient(90deg, #b8860b 0%, #ffdf00 50%, #b8860b 100%); }
        .gold-text { background: linear-gradient(90deg, #d4af37, #fcf6ba, #d4af37); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-glow { filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3)); }
        .progress-bar { transition: width 0.1s linear; }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="pb-32">

    <nav class="p-4 flex justify-between items-center border-b border-zinc-800 sticky top-0 bg-black/95 backdrop-blur-md z-50">
        <div class="flex items-center gap-3">
            <img src="logo.jpg" alt="Rei do Home" class="w-10 h-10 object-contain logo-glow">
            <span class="text-lg font-black uppercase tracking-tighter gold-text hidden sm:block">Rei do Home</span>
        </div>
        <div class="flex gap-6 font-bold text-[10px] uppercase tracking-[0.2em]">
            <a href="#" class="text-yellow-500">Início</a>
            <a href="#catalogo" class="hover:text-yellow-500 transition">Músicas</a>
            <button class="bg-zinc-800 px-3 py-1 rounded text-white border border-zinc-700">Admin</button>
        </div>
    </nav>

    <header class="relative h-[50vh] flex items-center justify-center overflow-hidden border-b border-zinc-900">
        <div class="absolute inset-0 bg-gradient-to-t from-[#050505] via-transparent to-black/60 z-10"></div>
        <img src="https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&q=80&w=2070" class="absolute inset-0 w-full h-full object-cover opacity-20">
        
        <div class="relative z-20 text-center px-4">
            <img src="logo.jpg" alt="Rei do Home" class="w-32 h-32 md:w-48 md:h-48 mx-auto mb-6 logo-glow">
            <h1 class="text-4xl md:text-6xl font-black uppercase tracking-tighter mb-2 gold-text">Rei do Home</h1>
            <p class="text-zinc-400 text-[10px] uppercase tracking-[0.5em] font-bold">Catálogo Exclusivo da Produtora</p>
        </div>
    </header>

    <main id="catalogo" class="max-w-4xl mx-auto px-6 py-12">
        <div class="flex items-center justify-between mb-8">
            <h3 class="text-xl font-black uppercase border-l-4 border-yellow-600 pl-4">Lançamentos</h3>
            <span id="count" class="text-xs text-zinc-500 font-bold uppercase">0 Músicas</span>
        </div>
        
        <div id="lista-musicas" class="grid gap-3">
            <div class="animate-pulse flex space-x-4 p-4 bg-zinc-900/20 rounded-lg">
                <div class="rounded bg-zinc-800 h-12 w-12"></div>
                <div class="flex-1 space-y-4 py-1">
                    <div class="h-4 bg-zinc-800 rounded w-3/4"></div>
                    <div class="h-4 bg-zinc-800 rounded w-1/2"></div>
                </div>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-black border-t border-zinc-800 p-4 z-[60] backdrop-blur-xl">
        <div class="max-w-4xl mx-auto">
            
            <div id="progress-container" class="w-full bg-zinc-800 h-1 mb-4 rounded-full overflow-hidden cursor-pointer">
                <div id="progress" class="gold-gradient h-full w-0 progress-bar"></div>
            </div>

            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4 w-1/2">
                    <div class="relative group">
                        <img id="player-img" src="logo.jpg" class="w-12 h-12 rounded border border-zinc-800 object-cover transition duration-500">
                    </div>
                    <div class="truncate">
                        <p id="player-title" class="text-sm font-black uppercase gold-text truncate">Nenhuma faixa</p>
                        <p id="player-artist" class="text-[10px] text-zinc-500 font-bold uppercase truncate">Selecione uma música</p>
                    </div>
                </div>

                <div class="flex items-center gap-6">
                    <button id="main-play-btn" class="w-14 h-14 gold-gradient rounded-full flex items-center justify-center text-black shadow-lg shadow-yellow-600/20 hover:scale-105 active:scale-95 transition">
                        <svg id="play-icon" class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.841z"></path></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. CONFIGURAÇÃO SUPABASE (COLOQUE SEUS DADOS AQUI)
        const SUPABASE_URL = 'https://lctmbrajjjjdscsghagx.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_mlPssSVkGCWWzzPj8Jz6Wg_ycQh_cw3';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const audio = new Audio();
        const playBtn = document.getElementById('main-play-btn');
        const playIcon = document.getElementById('play-icon');
        const progressBar = document.getElementById('progress');
        const playerTitle = document.getElementById('player-title');
        const playerArtist = document.getElementById('player-artist');
        const playerImg = document.getElementById('player-img');
        
        let isPlaying = false;

        // 2. BUSCAR MÚSICAS NO BANCO DE DADOS
        async function fetchMusicas() {
            const { data, error } = await _supabase
                .from('musicas')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Erro:', error);
                return;
            }

            const container = document.getElementById('lista-musicas');
            document.getElementById('count').innerText = `${data.length} Músicas`;
            container.innerHTML = '';

            data.forEach(m => {
                const card = document.createElement('div');
                card.className = "group flex items-center justify-between p-4 bg-zinc-900/40 border border-zinc-800 rounded-lg hover:bg-zinc-800/60 transition cursor-pointer";
                card.onclick = () => carregarMusica(m.audio_url, m.titulo, m.artista, m.capa_url);
                
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="relative w-12 h-12 flex-shrink-0">
                            <img src="${m.capa_url || 'logo.jpg'}" class="w-full h-full rounded border border-zinc-700 object-cover">
                        </div>
                        <div class="truncate">
                            <h4 class="font-bold group-hover:text-yellow-500 transition truncate">${m.titulo}</h4>
                            <p class="text-[10px] text-zinc-500 font-bold uppercase">${m.artista}</p>
                        </div>
                    </div>
                    <div class="text-yellow-600 opacity-0 group-hover:opacity-100 transition">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"></path></svg>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 3. FUNÇÕES DO PLAYER
        function carregarMusica(url, titulo, artista, capa) {
            audio.src = url;
            playerTitle.innerText = titulo;
            playerArtist.innerText = artista;
            playerImg.src = capa || 'logo.jpg';
            play();
        }

        function play() {
            audio.play();
            isPlaying = true;
            playIcon.innerHTML = '<path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8v4h2V8H7zm4 0v4h2V8h-2z" clip-rule="evenodd"></path>';
        }

        function pause() {
            audio.pause();
            isPlaying = false;
            playIcon.innerHTML = '<path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.841z"></path>';
        }

        playBtn.addEventListener('click', () => {
            if (!audio.src) return;
            isPlaying ? pause() : play();
        });

        audio.addEventListener('timeupdate', () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = pct + '%';
        });

        audio.addEventListener('ended', () => pause());

        // Inicia a busca
        fetchMusicas();
    </script>
</body>
</html>
