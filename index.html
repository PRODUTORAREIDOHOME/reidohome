<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtora Rei do Home | Plataforma Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; }
        .gold-gradient { background: linear-gradient(90deg, #b8860b 0%, #ffdf00 50%, #b8860b 100%); }
        .gold-text { background: linear-gradient(90deg, #d4af37, #fcf6ba, #d4af37); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-glow { filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3)); }
        .progress-bar { transition: width 0.1s linear; }
        .card-playing { border-color: #fbbf24 !important; background: rgba(251, 191, 36, 0.1) !important; scale: 1.02; }
        input[type="range"] { accent-color: #fbbf24; cursor: pointer; }

        /* Estilo do Painel Admin */
        #admin-panel { display: none; }
        #admin-panel.active { display: flex; }
        .glass-panel { background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px); border: 1px solid #333; }
    </style>
</head>
<body class="pb-32">

    <div id="admin-panel" class="fixed inset-0 z-[100] bg-black/80 items-center justify-center p-4">
        <div class="glass-panel w-full max-w-lg p-8 rounded-2xl shadow-2xl relative">
            <button onclick="toggleAdmin()" class="absolute top-4 right-4 text-zinc-500 hover:text-white">✕</button>
            
            <h2 class="text-2xl font-black gold-text uppercase mb-6 text-center">Gerenciamento Rei do Home</h2>
            
            <div class="space-y-4">
                <input type="text" id="add-titulo" placeholder="Título da Música" class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-lg outline-none focus:border-yellow-600">
                <input type="text" id="add-artista" placeholder="Artista" class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-lg outline-none focus:border-yellow-600">
                <input type="text" id="add-url" placeholder="Link do MP3 (URL)" class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-lg outline-none focus:border-yellow-600 text-xs">
                <input type="text" id="add-capa" placeholder="Link da Capa (URL)" class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-lg outline-none focus:border-yellow-600 text-xs">
                
                <button onclick="salvarMusica()" id="btn-salvar" class="w-full gold-gradient text-black font-black py-4 rounded-xl hover:scale-[1.02] transition active:scale-95 uppercase">Publicar Track</button>
            </div>

            <div class="mt-8 pt-6 border-t border-zinc-800 max-h-48 overflow-y-auto" id="admin-list">
                </div>
        </div>
    </div>

    <nav class="p-4 flex justify-between items-center border-b border-zinc-800 sticky top-0 bg-black/95 backdrop-blur-md z-50">
        <div class="flex items-center gap-3">
            <img src="logo.jpg" alt="Rei do Home" class="w-10 h-10 object-contain logo-glow">
            <span class="text-lg font-black uppercase tracking-tighter gold-text hidden sm:block">Rei do Home</span>
        </div>
        <div class="flex gap-6 font-bold text-[10px] uppercase tracking-[0.2em]">
            <a href="#" class="text-yellow-500">Início</a>
            <a href="#catalogo" class="hover:text-yellow-500 transition">Músicas</a>
            <button onclick="abrirAdminComSenha()" class="bg-zinc-800 px-3 py-1 rounded text-white border border-zinc-700 hover:bg-zinc-700 transition">Admin</button>
        </div>
    </nav>

    <header class="relative h-[50vh] flex items-center justify-center overflow-hidden border-b border-zinc-900">
        <div class="absolute inset-0 bg-gradient-to-t from-[#050505] via-transparent to-black/60 z-10"></div>
        <img src="https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&q=80&w=2070" class="absolute inset-0 w-full h-full object-cover opacity-20">
        <div class="relative z-20 text-center px-4">
            <img src="logo.jpg" alt="Rei do Home" class="w-32 h-32 md:w-48 md:h-48 mx-auto mb-6 logo-glow">
            <h1 class="text-4xl md:text-6xl font-black uppercase tracking-tighter mb-2 gold-text">Rei do Home</h1>
            <p class="text-zinc-400 text-[10px] uppercase tracking-[0.5em] font-bold">Catálogo Exclusivo da Produtora</p>
        </div>
    </header>

    <main id="catalogo" class="max-w-4xl mx-auto px-6 py-12">
        <div class="flex items-center justify-between mb-8">
            <h3 class="text-xl font-black uppercase border-l-4 border-yellow-600 pl-4">Lançamentos</h3>
            <span id="count" class="text-xs text-zinc-500 font-bold uppercase">0 Músicas</span>
        </div>
        <div id="lista-musicas" class="grid gap-3"></div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-black border-t border-zinc-800 p-4 z-[60] backdrop-blur-xl">
        <div class="max-w-4xl mx-auto">
            <div id="progress-container" class="w-full bg-zinc-800 h-1.5 mb-4 rounded-full overflow-hidden cursor-pointer group">
                <div id="progress" class="gold-gradient h-full w-0 progress-bar group-hover:h-2 transition-all"></div>
            </div>
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4 w-1/3">
                    <img id="player-img" src="logo.jpg" class="w-12 h-12 rounded border border-zinc-800 object-cover">
                    <div class="truncate">
                        <p id="player-title" class="text-sm font-black uppercase gold-text truncate">Nenhuma faixa</p>
                        <p id="player-artist" class="text-[10px] text-zinc-500 font-bold uppercase truncate">Selecione uma música</p>
                    </div>
                </div>
                <div class="flex items-center gap-6">
                    <button id="main-play-btn" class="w-14 h-14 gold-gradient rounded-full flex items-center justify-center text-black">
                        <svg id="play-icon" class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.841z"></path></svg>
                    </button>
                </div>
                <div class="flex items-center gap-3 w-1/3 justify-end hidden sm:flex">
                    <input type="range" id="volume-control" min="0" max="1" step="0.1" value="1" class="w-20">
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://lctmbrajjjjdscsghagx.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_mlPssSVkGCWWzzPj8Jz6Wg_ycQh_cw3';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const audio = new Audio();
        const playBtn = document.getElementById('main-play-btn');
        const playIcon = document.getElementById('play-icon');
        const progressBar = document.getElementById('progress');
        const progressContainer = document.getElementById('progress-container');
        const volumeControl = document.getElementById('volume-control');
        const playerTitle = document.getElementById('player-title');
        const playerArtist = document.getElementById('player-artist');
        const playerImg = document.getElementById('player-img');
        
        let isPlaying = false;
        let currentAudioUrl = '';

        // FUNÇÕES DO PAINEL ADMIN
        function abrirAdminComSenha() {
            const senha = prompt("Digite a senha do Produtor:");
            if (senha === "20262025") {
                toggleAdmin();
            } else {
                alert("Acesso negado!");
            }
        }

        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            panel.classList.toggle('active');
            if(panel.classList.contains('active')) fetchAdminList();
        }

        async function salvarMusica() {
            const titulo = document.getElementById('add-titulo').value;
            const artista = document.getElementById('add-artista').value;
            const audio_url = document.getElementById('add-url').value;
            const capa_url = document.getElementById('add-capa').value;

            if(!titulo || !artista || !audio_url) return alert("Preencha os campos obrigatórios!");

            const { error } = await _supabase.from('musicas').insert([{ titulo, artista, audio_url, capa_url }]);
            if (error) alert("Erro: " + error.message);
            else {
                alert("Track publicada!");
                location.reload();
            }
        }

        async function fetchAdminList() {
            const { data } = await _supabase.from('musicas').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('admin-list');
            list.innerHTML = '<h4 class="text-xs font-bold text-zinc-500 uppercase mb-3">Gerenciar Tracks Atuais</h4>';
            data.forEach(m => {
                const item = document.createElement('div');
                item.className = "flex justify-between items-center bg-black p-2 rounded mb-2 border border-zinc-800";
                item.innerHTML = `<span class="text-xs truncate w-2/3">${m.titulo}</span>
                                 <button onclick="deletarMusica(${m.id})" class="text-red-500 text-[10px] font-bold uppercase">Excluir</button>`;
                list.appendChild(item);
            });
        }

        async function deletarMusica(id) {
            if(confirm("Tem certeza que deseja remover esta música?")) {
                await _supabase.from('musicas').delete().eq('id', id);
                fetchAdminList();
                fetchMusicas();
            }
        }

        // FUNÇÕES DO PLAYER E SITE
        async function fetchMusicas() {
            const { data, error } = await _supabase.from('musicas').select('*').order('created_at', { ascending: false });
            if (error) return;
            const container = document.getElementById('lista-musicas');
            document.getElementById('count').innerText = `${data.length} Músicas`;
            container.innerHTML = '';
            data.forEach(m => {
                const card = document.createElement('div');
                card.id = `card-${btoa(m.audio_url).substring(0,10)}`;
                card.className = "song-card group flex items-center justify-between p-4 bg-zinc-900/40 border border-zinc-800 rounded-lg hover:bg-zinc-800/60 transition cursor-pointer";
                card.onclick = () => carregarMusica(m.audio_url, m.titulo, m.artista, m.capa_url, card.id);
                card.innerHTML = `<div class="flex items-center gap-4"><img src="${m.capa_url || 'logo.jpg'}" class="w-12 h-12 rounded border border-zinc-700 object-cover"><div><h4 class="font-bold group-hover:text-yellow-500 transition">${m.titulo}</h4><p class="text-[10px] text-zinc-500 font-bold uppercase">${m.artista}</p></div></div>`;
                container.appendChild(card);
            });
        }

        function carregarMusica(url, titulo, artista, capa, cardId) {
            if (currentAudioUrl === url) { isPlaying ? pause() : play(); return; }
            currentAudioUrl = url; audio.src = url;
            playerTitle.innerText = titulo; playerArtist.innerText = artista;
            playerImg.src = capa || 'logo.jpg';
            document.querySelectorAll('.song-card').forEach(c => c.classList.remove('card-playing'));
            document.getElementById(cardId).classList.add('card-playing');
            play();
        }

        function play() { audio.play(); isPlaying = true; playIcon.innerHTML = '<path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8v4h2V8H7zm4 0v4h2V8h-2z" clip-rule="evenodd"></path>'; }
        function pause() { audio.pause(); isPlaying = false; playIcon.innerHTML = '<path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.841z"></path>'; }
        
        playBtn.addEventListener('click', () => { if (audio.src) isPlaying ? pause() : play(); });
        audio.addEventListener('timeupdate', () => { progressBar.style.width = ((audio.currentTime / audio.duration) * 100 || 0) + '%'; });
        progressContainer.addEventListener('click', (e) => { audio.currentTime = (e.offsetX / progressContainer.clientWidth) * audio.duration; });
        volumeControl.addEventListener('input', (e) => { audio.volume = e.target.value; });
        audio.addEventListener('ended', () => pause());

        fetchMusicas();
    </script>
</body>
</html>
