<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rei Do Home Plataforma Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; }
        .gold-gradient { background: linear-gradient(90deg, #b8860b 0%, #ffdf00 50%, #b8860b 100%); }
        .gold-text { background: linear-gradient(90deg, #d4af37, #fcf6ba, #d4af37); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-glow { filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3)); }
        .progress-bar { transition: width 0.1s linear; }
        .card-playing { border-color: #fbbf24 !important; background: rgba(251, 191, 36, 0.1) !important; scale: 1.02; }
        input[type="range"] { accent-color: #fbbf24; cursor: pointer; }

        #admin-panel { display: none; }
        #admin-panel.active { display: flex; animation: fadeIn 0.3s ease; }
        .glass-panel { background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(20px); border: 1px solid #222; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-btn.active { border-bottom: 2px solid #fbbf24; color: #fbbf24; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="pb-32">

    <div id="admin-panel" class="fixed inset-0 z-[100] bg-black/90 items-center justify-center p-2 sm:p-4">
        <div class="glass-panel w-full max-w-4xl h-[90vh] flex flex-col rounded-3xl overflow-hidden relative border border-yellow-600/10">
            <div class="p-6 border-b border-zinc-800 flex justify-between items-center bg-zinc-900/50">
                <div>
                    <h2 class="text-xl font-black gold-text uppercase leading-none">ADMINISTRAÇÃO</h2>
                    <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-[0.2em] mt-1">Produtores: Gilvan e Ryan</p>
                </div>
                <button onclick="toggleAdmin()" class="bg-red-600/10 text-red-500 p-2 rounded-full hover:bg-red-600 hover:text-white transition">✕</button>
            </div>

            <div class="flex flex-1 overflow-hidden">
                <div class="w-20 sm:w-48 border-r border-zinc-800 flex flex-col p-4 gap-2 bg-black/20">
                    <button onclick="switchTab('tab-stats')" class="tab-btn active p-3 text-left text-[10px] font-black uppercase tracking-widest hover:bg-zinc-800 rounded-xl transition">📊 Resumo</button>
                    <button onclick="switchTab('tab-upload')" class="tab-btn p-3 text-left text-[10px] font-black uppercase tracking-widest hover:bg-zinc-800 rounded-xl transition">🎹 Publicar</button>
                    <button onclick="switchTab('tab-manage')" class="tab-btn p-3 text-left text-[10px] font-black uppercase tracking-widest hover:bg-zinc-800 rounded-xl transition">🎛️ Catálogo</button>
                    <button onclick="switchTab('tab-config')" class="tab-btn p-3 text-left text-[10px] font-black uppercase tracking-widest hover:bg-zinc-800 rounded-xl transition">⚙️ Estúdio</button>
                </div>

                <div class="flex-1 overflow-y-auto p-6 bg-black/40">
                    <div id="tab-stats" class="tab-content active space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
                                <p class="text-zinc-500 text-[10px] font-black uppercase mb-1">Total de Tracks</p>
                                <h3 id="stat-count" class="text-4xl font-black gold-text">0</h3>
                            </div>
                            <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
                                <p class="text-zinc-500 text-[10px] font-black uppercase mb-1">Servidor</p>
                                <h3 class="text-xl font-black text-green-500 uppercase">Ativo</h3>
                            </div>
                        </div>
                    </div>

                    <div id="tab-upload" class="tab-content space-y-4">
                        <input type="text" id="add-titulo" placeholder="Título da Música" class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-lg outline-none focus:border-yellow-600">
                        <input type="text" id="add-artista" placeholder="Artista" class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-lg outline-none focus:border-yellow-600">
                        <input type="text" id="add-capa" placeholder="URL da Capa (Opcional)" class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-lg outline-none focus:border-yellow-600">
                        <div class="relative border-2 border-dashed border-zinc-800 rounded-2xl p-8 text-center hover:border-yellow-600 transition group cursor-pointer bg-zinc-900/30">
                            <input type="file" id="add-file" class="absolute inset-0 opacity-0 cursor-pointer" accept="audio/*">
                            <span id="file-label" class="text-[10px] font-bold text-zinc-500 uppercase group-hover:text-yellow-500">Selecionar arquivo MP3</span>
                        </div>
                        <button onclick="salvarMusicaPro()" id="btn-salvar" class="w-full gold-gradient text-black font-black py-4 rounded-xl hover:scale-[1.02] transition uppercase text-xs">Publicar Track</button>
                    </div>

                    <div id="tab-manage" class="tab-content">
                        <div id="admin-list" class="space-y-2"></div>
                    </div>

                    <div id="tab-config" class="tab-content space-y-4">
                        <input type="text" id="status-input" placeholder="Mudar legenda do cabeçalho" class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-lg text-sm">
                        <button onclick="updateSiteStatus()" class="bg-zinc-800 px-6 py-2 rounded-lg text-[10px] font-black uppercase border border-zinc-700">Atualizar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <nav class="p-4 flex justify-between items-center border-b border-zinc-800 sticky top-0 bg-black/95 backdrop-blur-md z-50">
        <div class="flex items-center gap-3">
            <img src="logo.jpg" alt="Rei do Home" class="w-10 h-10 object-contain logo-glow">
            <span class="text-lg font-black uppercase tracking-tighter gold-text hidden sm:block">Rei do Home</span>
        </div>
        <div class="flex gap-4 items-center">
            <a href="#catalogo" class="text-[10px] font-bold uppercase tracking-[0.2em] hover:text-yellow-500 transition">Músicas</a>
            <button onclick="abrirAdminComSenha()" class="bg-zinc-800 px-4 py-1.5 rounded-full text-white text-[10px] font-black uppercase border border-zinc-700 hover:bg-yellow-600 hover:text-black transition">Painel Admin</button>
        </div>
    </nav>

    <header class="relative h-[40vh] flex items-center justify-center overflow-hidden border-b border-zinc-900">
        <div class="absolute inset-0 bg-gradient-to-t from-[#050505] via-transparent to-black/60 z-10"></div>
        <img src="https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&q=80&w=2070" class="absolute inset-0 w-full h-full object-cover opacity-20">
        <div class="relative z-20 text-center px-4">
            <img src="logo.jpg" alt="Rei do Home" class="w-24 h-24 mx-auto mb-4 logo-glow">
            <h1 class="text-5xl md:text-7xl font-black uppercase tracking-tighter mb-1 gold-text">Rei do Home</h1>
            <p id="site-caption" class="text-zinc-400 text-[10px] uppercase tracking-[0.5em] font-bold">Plataforma Oficial</p>
        </div>
    </header>

    <main id="catalogo" class="max-w-4xl mx-auto px-6 py-12">
        <div class="flex items-center justify-between mb-8">
            <h3 class="text-xl font-black uppercase border-l-4 border-yellow-600 pl-4">Lançamentos</h3>
            <span id="count" class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">0 Músicas</span>
        </div>
        <div id="lista-musicas" class="grid gap-3"></div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-black/95 border-t border-zinc-800 p-4 z-[60] backdrop-blur-xl">
        <div class="max-w-4xl mx-auto">
            <div id="progress-container" class="w-full bg-zinc-800 h-1 mb-4 rounded-full overflow-hidden cursor-pointer">
                <div id="progress" class="gold-gradient h-full w-0 progress-bar"></div>
            </div>
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4 w-1/3 truncate">
                    <img id="player-img" src="logo.jpg" class="w-12 h-12 rounded-lg border border-zinc-800 object-cover">
                    <div class="truncate">
                        <p id="player-title" class="text-sm font-black uppercase gold-text truncate">Rei do Home</p>
                        <p id="player-artist" class="text-[10px] text-zinc-500 font-bold uppercase truncate">Gilvan e Ryan</p>
                    </div>
                </div>

                <div class="flex items-center gap-6">
                    <button onclick="prevTrack()" class="text-zinc-400 hover:text-yellow-500 transition">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M8.445 14.832A1 1 0 0010 14v-2.798l5.445 3.63A1 1 0 0017 14V6a1 1 0 00-1.555-.832L10 8.798V6a1 1 0 00-1.555-.832l-6 4a1 1 0 000 1.664l6 4z"></path></svg>
                    </button>
                    <button id="main-play-btn" class="w-14 h-14 gold-gradient rounded-full flex items-center justify-center text-black hover:scale-105 transition active:scale-95">
                        <svg id="play-icon" class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.841z"></path></svg>
                    </button>
                    <button onclick="nextTrack()" class="text-zinc-400 hover:text-yellow-500 transition">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M4.555 5.168A1 1 0 003 6v8a1 1 0 001.555.832L10 11.202V14a1 1 0 001.555.832l6-4a1 1 0 000-1.664l-6-4A1 1 0 0010 6v2.798L4.555 5.168z"></path></svg>
                    </button>
                </div>

                <div class="flex items-center gap-3 w-1/3 justify-end hidden sm:flex">
                    <input type="range" id="volume-control" min="0" max="1" step="0.1" value="1" class="w-16">
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://lctmbrajjjjdscsghagx.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_mlPssSVkGCWWzzPj8Jz6Wg_ycQh_cw3';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const audio = new Audio();
        let isPlaying = false;
        let currentAudioUrl = '';
        let musicasData = [];
        let currentIndex = -1;

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function abrirAdminComSenha() {
            const senha = prompt("SENHA DO PRODUTOR:");
            if (senha === "20262025") toggleAdmin();
            else if(senha) alert("Senha errada!");
        }

        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            panel.classList.toggle('active');
            if(panel.classList.contains('active')) {
                fetchAdminList();
                switchTab('tab-stats');
            }
        }

        function updateSiteStatus() {
            const text = document.getElementById('status-input').value;
            if(text) document.getElementById('site-caption').innerText = text;
            alert("Atualizado!");
        }

        document.getElementById('add-file').onchange = (e) => {
            const name = e.target.files[0]?.name;
            if(name) document.getElementById('file-label').innerText = name;
        };

        async function salvarMusicaPro() {
            const file = document.getElementById('add-file').files[0];
            const titulo = document.getElementById('add-titulo').value;
            const artista = document.getElementById('add-artista').value;
            const capa = document.getElementById('add-capa').value;

            if(!file || !titulo) return alert("Selecione o arquivo!");

            const btn = document.getElementById('btn-salvar');
            btn.innerText = "ENVIANDO..."; btn.disabled = true;

            const filePath = `hits/${Date.now()}_${file.name}`;
            const { error: upErr } = await _supabase.storage.from('musicas').upload(filePath, file);
            
            if(upErr) { alert(upErr.message); btn.disabled = false; return; }

            const { data: urlData } = _supabase.storage.from('musicas').getPublicUrl(filePath);
            await _supabase.from('musicas').insert([{ titulo, artista, audio_url: urlData.publicUrl, capa_url: capa }]);

            alert("SUCESSO!"); location.reload();
        }

        async function fetchAdminList() {
            const { data } = await _supabase.from('musicas').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('admin-list');
            document.getElementById('stat-count').innerText = data.length;
            list.innerHTML = '';
            data.forEach(m => {
                const item = document.createElement('div');
                item.className = "flex justify-between items-center bg-zinc-900/50 p-3 rounded-xl border border-zinc-800";
                item.innerHTML = `<div class="flex items-center gap-3 truncate"><img src="${m.capa_url || 'logo.jpg'}" class="w-8 h-8 rounded object-cover"><span class="text-[10px] font-black uppercase truncate">${m.titulo}</span></div><button onclick="deletarMusica(${m.id})" class="text-red-500 text-[10px] font-black hover:bg-red-600/10 px-3 py-1 rounded-lg">EXCLUIR</button>`;
                list.appendChild(item);
            });
        }

        async function deletarMusica(id) {
            if(confirm("DELETAR?")) {
                await _supabase.from('musicas').delete().eq('id', id);
                fetchAdminList(); fetchMusicas();
            }
        }

        async function fetchMusicas() {
            const { data, error } = await _supabase.from('musicas').select('*').order('created_at', { ascending: false });
            if (error) return;
            musicasData = data;
            const container = document.getElementById('lista-musicas');
            document.getElementById('count').innerText = `${data.length} Músicas`;
            container.innerHTML = '';
            data.forEach((m, index) => {
                const card = document.createElement('div');
                card.id = `card-${m.id}`;
                card.className = "song-card group flex items-center justify-between p-4 bg-zinc-900/20 border border-zinc-800/50 rounded-2xl hover:bg-zinc-800/60 transition cursor-pointer";
                card.onclick = () => { currentIndex = index; carregarMusica(m.audio_url, m.titulo, m.artista, m.capa_url, card.id); };
                card.innerHTML = `<div class="flex items-center gap-4"><img src="${m.capa_url || 'logo.jpg'}" class="w-14 h-14 rounded-xl border border-zinc-800 object-cover"><div><h4 class="text-sm font-black uppercase gold-text">${m.titulo}</h4><p class="text-[10px] text-zinc-500 font-black uppercase">${m.artista}</p></div></div><div class="text-yellow-600 opacity-20 group-hover:opacity-100 transition">▶</div>`;
                container.appendChild(card);
            });
        }

        function carregarMusica(url, titulo, artista, capa, cardId) {
            if (currentAudioUrl === url) { isPlaying ? pause() : play(); return; }
            currentAudioUrl = url; audio.src = url;
            document.getElementById('player-title').innerText = titulo; 
            document.getElementById('player-artist').innerText = artista;
            document.getElementById('player-img').src = capa || 'logo.jpg';
            document.querySelectorAll('.song-card').forEach(c => c.classList.remove('card-playing'));
            const card = document.getElementById(cardId);
            if(card) card.classList.add('card-playing');
            play();
        }

        function play() { audio.play(); isPlaying = true; document.getElementById('play-icon').innerHTML = '<path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8v4h2V8H7zm4 0v4h2V8h-2z" clip-rule="evenodd"></path>'; }
        function pause() { audio.pause(); isPlaying = false; document.getElementById('play-icon').innerHTML = '<path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.841z"></path>'; }
        
        function nextTrack() {
            if (musicasData.length === 0) return;
            currentIndex = (currentIndex + 1) % musicasData.length;
            const m = musicasData[currentIndex];
            carregarMusica(m.audio_url, m.titulo, m.artista, m.capa_url, `card-${m.id}`);
        }

        function prevTrack() {
            if (musicasData.length === 0) return;
            currentIndex = (currentIndex - 1 + musicasData.length) % musicasData.length;
            const m = musicasData[currentIndex];
            carregarMusica(m.audio_url, m.titulo, m.artista, m.capa_url, `card-${m.id}`);
        }

        document.getElementById('main-play-btn').onclick = () => { if (audio.src) isPlaying ? pause() : play(); };
        audio.ontimeupdate = () => { document.getElementById('progress').style.width = ((audio.currentTime / audio.duration) * 100 || 0) + '%'; };
        audio.onended = () => nextTrack();
        document.getElementById('progress-container').onclick = (e) => { audio.currentTime = (e.offsetX / e.target.clientWidth) * audio.duration; };
        document.getElementById('volume-control').oninput = (e) => { audio.volume = e.target.value; };

        fetchMusicas();
    </script>
</body>
</html>
